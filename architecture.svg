<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <title>Automation Scout architecture (as built)</title>
  <desc>A user interacts with a Streamlit app. The app calls Azure AI Foundry (gpt-5-mini) to extract process details and write recommendations, applies a Python scoring and ranking engine, and reads/writes the process inventory to Supabase. The scoring engine's structured output (score, breakdown, rank) is passed to Foundry as evidence — recommendations are grounded in the analysis rather than freelanced. This is the Microsoft Foundry IQ integration in practice.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7c3aed" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="380" fill="#ffffff"/>

  <!-- User -->
  <rect x="270" y="24" width="140" height="44" rx="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <text x="340" y="46" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#1e293b">User (BA)</text>

  <line x1="340" y1="68" x2="340" y2="97" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Streamlit app (your code) -->
  <rect x="210" y="100" width="260" height="58" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="340" y="121" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#1e293b">Streamlit app</text>
  <text x="340" y="140" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#64748b">Discovery + Analysis modes</text>

  <!-- spokes -->
  <path d="M340 158 L340 192 L125 192 L125 219" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M340 158 L340 219" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M340 158 L340 192 L555 192 L555 219" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>

  <text x="232" y="184" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#64748b">extract + recommend</text>
  <text x="448" y="184" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#64748b">read + write</text>
  <text x="350" y="206" text-anchor="start" dominant-baseline="central" font-size="12" fill="#64748b">score + rank</text>

  <!-- Azure AI Foundry (external) -->
  <rect x="35" y="222" width="180" height="64" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
  <text x="125" y="247" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#1e293b">Azure AI Foundry</text>
  <text x="125" y="266" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#64748b">gpt-5-mini</text>

  <!-- Microsoft Foundry IQ pill (below Foundry box) -->
  <rect x="55" y="294" width="140" height="20" rx="10" fill="#0d9488" stroke="none"/>
  <text x="125" y="304" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#ffffff">Microsoft Foundry IQ</text>

  <!-- Scoring engine (your code) -->
  <rect x="250" y="222" width="180" height="64" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="340" y="247" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#1e293b">Scoring &amp; ranking</text>
  <text x="340" y="266" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#64748b">Python rules engine</text>

  <!-- Grounding flow: Scoring -> Foundry (dashed purple, between boxes) -->
  <line x1="250" y1="254" x2="219" y2="254" stroke="#7c3aed" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arrow-purple)"/>

  <!-- Supabase (external) -->
  <rect x="465" y="222" width="180" height="64" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
  <text x="555" y="247" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#1e293b">Supabase</text>
  <text x="555" y="266" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#64748b">Inventory store</text>

  <!-- legend (4 entries) -->
  <rect x="55" y="350" width="14" height="14" rx="3" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="75" y="357" dominant-baseline="central" font-size="12" fill="#64748b">code</text>

  <rect x="195" y="350" width="14" height="14" rx="3" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
  <text x="215" y="357" dominant-baseline="central" font-size="12" fill="#64748b">External service</text>

  <rect x="355" y="350" width="14" height="14" rx="3" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <text x="375" y="357" dominant-baseline="central" font-size="12" fill="#64748b">User</text>

  <line x1="445" y1="357" x2="475" y2="357" stroke="#7c3aed" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="485" y="357" dominant-baseline="central" font-size="12" fill="#64748b">Grounding flow</text>
</svg>
